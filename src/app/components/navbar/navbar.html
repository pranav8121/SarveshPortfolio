    <button
      class="hamburger"
      [class.open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Toggle menu">
      <span class="hamburger-line top"></span>
      <span class="hamburger-line mid"></span>
      <span class="hamburger-line bot"></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="menuOpen()">
    <div class="mobile-menu-inner">
      @for (item of navItems; track item.label; let i = $index) {
        <a
          class="mobile-nav-link"
          [style.transition-delay]="menuOpen() ? (i * 60 + 100) + 'ms' : '0ms'"
          [class.visible]="menuOpen()"
          (click)="scrollTo(item.href)"
          role="button"
          tabindex="0">
          <span class="mobile-link-num">0{{ i + 1 }}</span>
          {{ item.label }}
        </a>
      }
      <a
        class="mobile-ig-link"
        href="https://instagram.com/sarvesh.createz"
        target="_blank"
        rel="noopener noreferrer">
