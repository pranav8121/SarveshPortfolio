<div
  class="lightbox-backdrop"
  [class.visible]="visible"
  (click)="onBackdropClick($event)"
  role="dialog"
  aria-modal="true">

  <!-- Close -->
  <button class="lb-close" (click)="onClose()" aria-label="Close lightbox">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  </button>

  <!-- Counter -->
  <div class="lb-counter">
    <span class="lb-current">{{ currentIndex + 1 }}</span>
    <span class="lb-sep">/</span>
    <span class="lb-total">{{ total }}</span>
  </div>

  @if (current) {
    <!-- Image -->
    <div class="lb-image-wrap">
      <div class="lb-shutter-line top"></div>
      <div class="lb-shutter-line bottom"></div>
      <img
        class="lb-image"
        [src]="current.srcFull"
        [alt]="current.title"
        loading="lazy"
      />
    </div>

    <!-- Caption -->
    <div class="lb-caption">
      <h3 class="lb-title">{{ current.title }}</h3>
      <p class="lb-meta">
        <span class="lb-category">{{ current.category }}</span>
        @for (tag of current.tags; track tag) {
          <span class="lb-tag">#{{ tag }}</span>
        }
      </p>
    </div>
  }

  <!-- Nav Prev -->
  <button
    class="lb-nav lb-prev"
    [disabled]="!hasPrev"
    (click)="prev()"
    aria-label="Previous photo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>

  <!-- Nav Next -->
  <button
    class="lb-nav lb-next"
    [disabled]="!hasNext"
    (click)="next()"
    aria-label="Next photo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  </button>

</div>
