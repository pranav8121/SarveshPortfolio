<div
  class="cursor-outer"
  [class.hovering]="isHovering"
  [class.clicking]="isClicking"
  [class.on-image]="isOnImage"
  [style.left.px]="dotX"
  [style.top.px]="dotY"
>
  <div class="cursor-ring">
    <div class="cursor-ring-inner"></div>
    <div class="cursor-aperture">
      <span class="blade"></span>
      <span class="blade"></span>
      <span class="blade"></span>
      <span class="blade"></span>
      <span class="blade"></span>
      <span class="blade"></span>
    </div>
  </div>
  <span class="cursor-label">{{ label }}</span>
</div>

<div
  class="cursor-dot"
  [class.clicking]="isClicking"
  [style.left.px]="mouseX"
  [style.top.px]="mouseY"
></div>
